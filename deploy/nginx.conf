# ==============================================================================
# nginx configuration for Bingo app
# Place at: /etc/nginx/sites-available/bingo
# Enable:   ln -s /etc/nginx/sites-available/bingo /etc/nginx/sites-enabled/bingo
#
# Expects:
#   - Frontend static files at /var/www/bingo
#   - Go API server listening on 127.0.0.1:8080
#   - SSL certificates managed by Certbot (Let's Encrypt)
#
# Replace YOUR_DOMAIN with your actual domain name before deployment.
# ==============================================================================

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN;

    # ── SSL (managed by certbot) ───────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # ── API proxy: /api/* → Go backend ────────────────────────────────────────
    # All requests matching /api/ are forwarded to the local Go server.
    location /api/ {
        # Remove the /api prefix before forwarding, so the backend sees /auth/...,/... etc.
        rewrite ^/api(/.*)$ $1 break;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Required for WebSocket upgrades if ever needed
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client info to the backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — increase if you have long-running requests
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        # Disable buffering so streaming responses work correctly
        proxy_buffering off;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    # Serve the built Vite/React app. All unknown paths fall back to index.html
    # so that client-side routing (react-router-dom) works correctly.
    location / {
        root  /var/www/bingo;
        index index.html;

        # SPA fallback: if file/dir not found, serve index.html
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (Vite adds content hashes to filenames)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
